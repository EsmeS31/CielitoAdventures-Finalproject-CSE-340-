services:
  - type: web
    name: cielito-adventures
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cielito-adventures-db
          property: connectionString

databases:
  - name: cielito-adventures-db
    plan: free
